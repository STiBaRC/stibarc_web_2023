<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1, maximum-scale=5, user-scalable=yes, width=device-width">
	<link rel="icon" type="image/png" href="/img/icon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/css/themes/default.css" id="theme">
	<link rel="stylesheet" href="/css/global.css">
	<link rel="stylesheet" href="/oauth/callback/callback.css">
	<title>STiBaRC Account Linking Callback</title>
	<script src="/js/API.js"></script>
	<script src="/js/global.js"></script>
	<script src="/oauth/callback/callback.js"></script>
</head>

<body>
	<main>
		<div class="flexcontainer flexcolumn block" id="callback-container">
			<h2>Linking Account...</h2>
			<div class="loader"></div>
			<span>&nbsp;</span>
		</div>
	</main>
	<dialog id="error-dialog">
		<div class="flexcontainer flexcolumn">
			<h2>Account Linking Failed</h2>
			<p id="error-message">An unknown error occurred while linking your account. Please try again later.</p>
			<div class="flexcontainer">
				<button class="button primary" id="error-go-back">Go back</button>
			</div>
		</div>
	</dialog>
</body>

</html>
